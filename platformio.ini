[platformio]
default_envs = pocketwroom

; ── Common settings shared across embedded targets ────────────────────────────
[env:_embedded_base]
framework = arduino
platform   = espressif32
monitor_speed  = 115200
upload_speed   = 921600
extra_scripts = pre:support/git_version.py

; All local libraries live under libs/.
; libs/hal is listed separately so PlatformIO finds the nested hal sub-libraries
; (libs/hal/esp32s3, libs/hal/native) — lib_extra_dirs is not recursive beyond
; one level of subdirectories.
lib_extra_dirs = libs, libs/hal
lib_ldf_mode = chain

; SPIFFS for sound effects and file storage
board_build.filesystem = spiffs

; Exclude the native-only simulator entry point from all embedded targets
build_src_filter = +<*> -<simulator/>

build_flags =
  -std=gnu++17
  -D LV_CONF_INCLUDE_SIMPLE
  -D BOARD_EMBEDDED=1
  -Iinclude
  -Ilibs/hal/interfaces
  -Ilibs/ui/fonts

lib_deps =
  jsc/ArduinoLog@^1.2.1
  bblanchon/ArduinoJson@^7.0.0
  lvgl/lvgl@^9.0.0
  lovyan03/LovyanGFX
  WiFiClientSecure


; ── Morserino Pocket (ESP32-S3 WROOM) ────────────────────────────────────────
[env:pocketwroom]
extends = env:_embedded_base
board   = esp32-s3-devkitc-1
board_upload.use_1200bps_touch = true
board_build.arduino.memory_type = qio_opi
board_build.psram = enabled

build_flags =
  ${env:_embedded_base.build_flags}
  -Ilibs/hal/esp32s3
  -Ilibs/cw-engine/include
  -Ilibs/cw-decoder/include
  -Ilibs/content/include
  -Ilibs/training/include
  -Ilibs/cw-chatbot/include
  -Ilibs/net-cw/include
  -Ilibs/games/include
  -D BOARD_POCKETWROOM=1
  ; User input
  -D PIN_TOUCH_LEFT=4
  -D PIN_TOUCH_RIGHT=5
  -D PIN_ROT_DT=14
  -D PIN_ROT_CLK=13
  -D PIN_ROT_BTN=12
  -D PIN_PADDLE_LEFT=2
  -D PIN_PADDLE_RIGHT=1
  -D PIN_KEYER=41
  -D PIN_BUTTON=0
  ; Display (ST7789 170x320)
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=170
  -D TFT_HEIGHT=320
  -D TFT_MISO=-1
  -D TFT_MOSI=48
  -D TFT_SCLK=38
  -D TFT_CS=39
  -D TFT_DC=47
  -D TFT_RST=40
  -D TFT_BL=21
  -D TFT_OFFSET_X=35
  ; I2S audio
  -D CONFIG_SOUND_I2S=1
  -D CONFIG_DECODER_I2S=1
  -D CONFIG_I2S_BCK_PIN=16
  -D CONFIG_I2S_LRCK_PIN=17
  -D CONFIG_I2S_DATA_PIN=18
  -D CONFIG_I2S_DATA_IN_PIN=8
  ; TLV320AIC3100 codec
  -D CONFIG_TLV320AIC3100=1
  -D CONFIG_TLV320AIC3100_SDA=15
  -D CONFIG_TLV320AIC3100_SCL=7
  -D CONFIG_TLV320AIC3100_INT=6
  -D CONFIG_TLV320AIC3100_RST=45
  ; Power
  -D PIN_VEXT=42
  -D VEXT_ON_VALUE=1
  -D CONFIG_MCP73871=1
  -D CONFIG_MCP_PG_PIN=11
  -D CONFIG_MCP_STAT1_PIN=9
  -D CONFIG_MCP_STAT2_PIN=10
  -D CONFIG_BATMEAS_PIN=3
  ; USB CDC
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
  ${env:_embedded_base.lib_deps}
  https://github.com/haklein/cw-i2s-sidetone.git#v1.0.4
  madhephaestus/ESP32Encoder@^0.11.7
  https://github.com/haklein/DisplayWrapper.git
  haklein/tlv320aic31xx@^1.0.5
  h2zero/NimBLE-Arduino@^2.0.0
  mathieucarbou/ESPAsyncWebServer@^3.6.0
  ricmoo/QRCode@^0.0.1


; ── Original Morserino-32 (Heltec WiFi LoRa 32 V2) ───────────────────────────
[env:original_m32]
extends = env:_embedded_base
board   = heltec_wifi_lora_32_V2

build_flags =
  ${env:_embedded_base.build_flags}
  -Ilibs/hal/original_m32
  -Ilibs/hal/esp32s3
  -Ilibs/cw-engine/include
  -Ilibs/cw-decoder/include
  -Ilibs/content/include
  -Ilibs/training/include
  -Ilibs/cw-chatbot/include
  -Ilibs/net-cw/include
  -Ilibs/games/include
  -D BOARD_ORIGINAL_M32=1
  -D LV_COLOR_DEPTH=8
  -D LV_MEM_SIZE="(48U * 1024U)"
  -D LV_FONT_MONTSERRAT_10=1
  -D LV_FONT_UNSCII_8=1
  ; User input — touch (ESP32 T2, T5)
  -D PIN_TOUCH_LEFT=2
  -D PIN_TOUCH_RIGHT=12
  ; External paddle jack (V4: L=32 R=33, V3: swapped)
  -D PIN_PADDLE_LEFT_V4=32
  -D PIN_PADDLE_RIGHT_V4=33
  ; Battery ADC (V4=37, V3=13 — selected at runtime by board version detect)
  -D CONFIG_BATMEAS_PIN_V4=37
  -D CONFIG_BATMEAS_PIN_V3=13
  ; Encoder
  -D PIN_ROT_CLK=38
  -D PIN_ROT_DT=39
  -D PIN_ROT_BTN=37
  -D PIN_BUTTON=0
  ; Keyer output
  -D PIN_KEYER=25
  ; Display (SSD1306 128x64 OLED I2C)
  -D SSD1306_DRIVER=1
  -D TFT_WIDTH=128
  -D TFT_HEIGHT=64
  -D OLED_SDA=4
  -D OLED_SCL=15
  -D OLED_RST=16
  ; Audio — PWM (no I2S codec)
  -D CONFIG_SOUND_PWM=1
  -D CONFIG_LF_PIN=23
  -D CONFIG_HF_PIN=22
  -D CONFIG_LINEOUT_PIN=17
  ; Decoder — ADC input (deferred)
  -D CONFIG_DECODER_ADC=1
  -D CONFIG_AUDIO_IN_PIN=36
  ; Power
  -D PIN_VEXT=21
  -D VEXT_ON_VALUE=0
  ; LoRa pins (deferred, but captured)
  -D LORA_CS=18
  -D LORA_RST=14
  -D LORA_DIO0=26
  -D LORA_DIO1=35
  -D LORA_SCK=5
  -D LORA_MISO=19
  -D LORA_MOSI=27

lib_deps =
  ${env:_embedded_base.lib_deps}
  madhephaestus/ESP32Encoder@^0.11.7
  h2zero/NimBLE-Arduino@^2.0.0
  mathieucarbou/ESPAsyncWebServer@^3.6.0
  ricmoo/QRCode@^0.0.1


; ── M5Stack Core2 (touchscreen dev/test target) ───────────────────────────────
[env:m5core2]
extends = env:_embedded_base
board   = m5stack-core2

build_flags =
  ${env:_embedded_base.build_flags}
  -D BOARD_M5CORE2=1
  ; Paddle GPIOs (external header pins)
  -D PIN_PADDLE_LEFT=32
  -D PIN_PADDLE_RIGHT=33
  ; I2S audio (via SPK_HAT or internal amp path)
  -D CONFIG_SOUND_I2S=1
  -D CONFIG_I2S_BCK_PIN=12
  -D CONFIG_I2S_LRCK_PIN=0
  -D CONFIG_I2S_DATA_PIN=2
  ; No I2S input on base Core2
  -D CONFIG_DECODER_I2S=0
  ; Display handled by M5Unified (ILI9342C 320x240)
  -D TFT_WIDTH=320
  -D TFT_HEIGHT=240

lib_deps =
  ${env:_embedded_base.lib_deps}
  m5stack/M5Unified@^0.1.14
  h2zero/NimBLE-Arduino@^2.0.0


; ── Native (host PC simulation / unit tests) ─────────────────────────────────
[env:native]
platform = native
; Exclude Arduino-dependent src/main.cpp; compile only test/native/ sources.
; Paths in build_src_filter are relative to the project src_dir (src/).
build_src_filter = -<*> +<../test/native/>
build_flags =
  -std=c++17
  -D NATIVE_BUILD=1
  -lasound       ; ALSA PCM (sidetone) + ALSA sequencer (MIDI key input)
  -lpthread
lib_extra_dirs = libs
lib_deps =
  ; No hardware deps on native — hal/native provides ALSA/MIDI implementations


; ── Simulator (interactive SDL2 desktop app) ──────────────────────────────────
; Full functional Morse trainer on the host PC.
; Uses LVGL's built-in SDL2 driver for display and NativeKeyInputSdl for input.
; Run with:  pio run -e simulator -t upload
[env:simulator]
platform = native
extra_scripts = pre:support/git_version.py, post:support/sdl2_build_extra.py
; Only compile src/simulator/main.cpp (not the Arduino src/main.cpp).
build_src_filter = -<*> +<simulator/>
build_flags =
  -std=c++17
  -D NATIVE_BUILD=1
  ; Bypass shared include/lv_conf.h (tuned for embedded targets)
  -D LV_CONF_SKIP
  -D LV_CONF_INCLUDE_SIMPLE
  ; LVGL SDL2 driver
  -D LV_USE_SDL=1
  -D LV_LVGL_H_INCLUDE_SIMPLE
  -D LV_SDL_INCLUDE_PATH="\"SDL2/SDL.h\""
  ; Window size — wider than physical 170×320 to give comfortable desktop view
  ; (passed directly to lv_sdl_window_create() in src/simulator/main.cpp)
  -D LV_SDL_HOR_RES=480
  -D LV_SDL_VER_RES=320
  ; LVGL memory
  -D LV_MEM_CUSTOM=1
  -D LV_MEM_SIZE="(256U * 1024U)"
  ; Intel One Mono fonts (simulator bypasses lv_conf.h; overlay header sets default)
  -D LV_FONT_MONTSERRAT_14=1
  -D LV_FONT_MONTSERRAT_20=1
  -include include/lv_conf_sim.h
  ; Linker libs
  -lSDL2
  -lasound
  -lpthread
  ; Include paths
  -Iinclude
  -Ilibs/hal/interfaces
  -Ilibs/ui/fonts
  -Ilibs/hal/native
  -Ilibs/cw-engine/include
  -Ilibs/cw-decoder/include
  -Ilibs/content/include
  -Ilibs/training/include
  -Ilibs/cw-chatbot/include
  -Ilibs/net-cw/include
  -Ilibs/games/include
lib_extra_dirs = libs, libs/hal
lib_ldf_mode = chain
lib_deps =
  lvgl/lvgl@^9.0.0


; ── Smoke test (hardware bring-up / regression check) ────────────────────────
; Same hardware config as pocketwroom but compiles only the smoke test:
; exercises display, audio, and all inputs — events logged to Serial.
; Run with:  pio run -e pocketwroom_smoke -t upload -t monitor
[env:pocketwroom_smoke]
extends = env:pocketwroom
build_flags =
  ${env:pocketwroom.build_flags}
  -D SMOKE_TEST=1
