name: Build & Deploy Firmware

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags for version detection

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build pocketwroom firmware
        run: pio run -e pocketwroom

      - name: Determine version
        id: version
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format=%cI)
          # Detect tag on HEAD regardless of trigger (branch push, tag push, etc.)
          TAG=$(git tag --points-at HEAD | grep '^v' | sort -V | tail -1)
          if [[ -n "$TAG" ]]; then
            VER="${TAG#v}"
            echo "version=$VER"   >> "$GITHUB_OUTPUT"
            echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
            echo "dir=$TAG"       >> "$GITHUB_OUTPUT"
          else
            VER="dev-$COMMIT"
            echo "version=$VER"   >> "$GITHUB_OUTPUT"
            echo "tag="           >> "$GITHUB_OUTPUT"
            echo "dir=dev-$COMMIT" >> "$GITHUB_OUTPUT"
          fi
          echo "commit=$COMMIT"   >> "$GITHUB_OUTPUT"
          echo "date=$DATE"       >> "$GITHUB_OUTPUT"

      # ── Collect firmware binaries as downloadable artifact ──────────────
      - name: Collect firmware binaries
        run: |
          mkdir -p firmware
          cp .pio/build/pocketwroom/bootloader.bin  firmware/
          cp .pio/build/pocketwroom/partitions.bin   firmware/
          cp .pio/build/pocketwroom/firmware.bin      firmware/
          BOOT_APP0=$(find ~/.platformio/packages/framework-arduinoespressif32 \
                      -name boot_app0.bin -path '*/partitions/*' | head -1)
          cp "$BOOT_APP0" firmware/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: m32-ng-firmware-${{ steps.version.outputs.version }}
          path: firmware/

      # ── Build Pages site content (not on PRs) ───────────────────────────
      - name: Build Pages site
        if: github.event_name != 'pull_request'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG:     ${{ steps.version.outputs.tag }}
          DIR:     ${{ steps.version.outputs.dir }}
          COMMIT:  ${{ steps.version.outputs.commit }}
          DATE:    ${{ steps.version.outputs.date }}
        run: |
          set -e

          # ── Clone gh-pages for accumulated state (versions, old builds) ──
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git clone --branch gh-pages --single-branch "$REPO_URL" _site 2>/dev/null || {
            mkdir _site
          }

          # Clean git metadata — we only need the file content
          rm -rf _site/.git

          # ── Copy firmware into versioned directory ─────────────────────
          mkdir -p "_site/firmware/$DIR"
          cp firmware/* "_site/firmware/$DIR/"

          # ── Per-version manifest.json ────────────────────────────────────
          cat > "_site/firmware/$DIR/manifest.json" << EOF
          {
            "name": "Morserino-32 NG",
            "version": "$VERSION",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "bootloader.bin",  "offset": 0 },
                  { "path": "partitions.bin",  "offset": 32768 },
                  { "path": "boot_app0.bin",   "offset": 57344 },
                  { "path": "firmware.bin",    "offset": 65536 }
                ]
              }
            ]
          }
          EOF

          # ── Update versions.json ─────────────────────────────────────────
          cd _site
          python3 << 'PYEOF'
          import json, os, subprocess, shutil

          VERSIONS_FILE = "versions.json"
          MAX_DEV_BUILDS = 10

          def tag_for_commit(short_hash):
              """Check if a commit has a v* tag in the repo."""
              try:
                  out = subprocess.check_output(
                      ["git", "-C", "..", "tag", "--points-at", short_hash],
                      stderr=subprocess.DEVNULL
                  ).decode().strip()
                  for line in out.splitlines():
                      if line.startswith("v"):
                          return line
              except Exception:
                  pass
              return None

          versions = []
          if os.path.exists(VERSIONS_FILE):
              with open(VERSIONS_FILE) as f:
                  versions = json.load(f).get("versions", [])

          # Promote any untagged dev entries whose commits now have tags
          existing_tagged = {v["version"] for v in versions if v["tag"]}
          promoted = []
          for v in versions[:]:  # iterate over copy
              if v["tag"]:
                  continue
              found_tag = tag_for_commit(v["commit"])
              if not found_tag:
                  continue
              new_ver = found_tag.lstrip("v")
              if new_ver in existing_tagged:
                  # Tagged release already exists — just remove the dev duplicate
                  versions.remove(v)
                  promoted.append(found_tag + " (dedup)")
                  continue
              new_dir = "firmware/" + found_tag
              # Rename firmware directory and update its manifest
              if os.path.isdir(v["dir"]) and not os.path.isdir(new_dir):
                  os.rename(v["dir"], new_dir)
              mf = os.path.join(new_dir, "manifest.json")
              if os.path.exists(mf):
                  with open(mf) as f:
                      manifest = json.load(f)
                  manifest["version"] = new_ver
                  with open(mf, "w") as f:
                      json.dump(manifest, f, indent=2)
              v["version"] = new_ver
              v["tag"] = found_tag
              v["dir"] = new_dir
              existing_tagged.add(new_ver)
              promoted.append(found_tag)

          # Remove existing entry for this version (re-build of same commit)
          ver = os.environ["VERSION"]
          commit = os.environ["COMMIT"]
          tag = os.environ["TAG"] or None
          versions = [v for v in versions if v["version"] != ver]

          # If this is a tagged build, also remove any dev entry for the same commit
          if tag:
              versions = [v for v in versions if not (v["commit"] == commit and not v["tag"])]

          # Add new entry
          entry = {
              "version": ver,
              "tag": tag,
              "date": os.environ["DATE"],
              "commit": commit,
              "dir": "firmware/" + os.environ["DIR"],
          }
          versions.append(entry)

          # Prune old dev builds (keep last MAX_DEV_BUILDS)
          tagged   = [v for v in versions if v["tag"]]
          untagged = [v for v in versions if not v["tag"]]
          untagged.sort(key=lambda v: v["date"], reverse=True)

          # Remove pruned dev build directories
          for old in untagged[MAX_DEV_BUILDS:]:
              d = old["dir"]
              if os.path.isdir(d):
                  shutil.rmtree(d)

          untagged = untagged[:MAX_DEV_BUILDS]
          versions = tagged + untagged

          with open(VERSIONS_FILE, "w") as f:
              json.dump({"versions": versions}, f, indent=2)

          if promoted:
              print(f"Promoted dev builds to releases: {promoted}")
          PYEOF

          # ── Copy static installer page ───────────────────────────────────
          cd ..
          cp .github/web-installer/index.html _site/index.html
          touch _site/.nojekyll

          # ── Also update gh-pages branch for state persistence ────────────
          cd _site
          git init -b gh-pages
          git remote add origin "$REPO_URL"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy firmware $VERSION ($COMMIT)"
          git push --force origin gh-pages
          rm -rf .git

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
